syntax = "proto3";

package patchbase.agent;

import "google/protobuf/timestamp.proto";

option go_package = "go.patchbase.net/proto/agent";

message Package {
  string name = 1;
  int32 epoch = 2;
  string version = 3;
  string release = 4;
  string arch = 5;
  string source_rpm = 6;
  string vendor = 7;
  google.protobuf.Timestamp install_time = 8;
  string repo_origin = 9;
  string nevra = 10;
}
