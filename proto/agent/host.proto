syntax = "proto3";

package patchbase.agent;

import "google/protobuf/timestamp.proto";
import "patchbase/agent/common.proto";
import "validate/validate.proto";

option go_package = "go.patchbase.net/proto/agent";

message Host {
  string machine_id = 1;
  string hostname = 2;
  OsFamily os_family = 3;
  string os_name = 4;
  string os_version = 5;
  int32 os_major = 6;
  Architecture architecture = 7;
  int32 available_package_update_count = 8;
  string agent_version = 9;
  google.protobuf.Timestamp boot_time = 10;
  int64 uptime_seconds = 11;
  VirtualizationRole virtualization_role = 12;
  repeated string environment_tags = 13;
  repeated string ip_addresses = 14;
}

message RegisterHostMetadata {
  string ip_address = 1;
  string os_name = 2;
  string os_version = 3;
  string architecture = 4;
}

message RegisterHostRequest {
  string registration_token = 1 [(validate.rules).string = {min_len: 1, max_len: 255}];
  string hostname = 2 [(validate.rules).string = {min_len: 1, max_len: 255}];
  string machine_id = 3 [(validate.rules).string = {min_len: 1, max_len: 128}];
  RegisterHostMetadata metadata = 4 [(validate.rules).message.required = true];
}

message RegisterHostResponse {
  string host_id = 1;
  string host_access_token = 2;
  string approval_status = 3;
}
