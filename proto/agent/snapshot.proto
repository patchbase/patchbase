syntax = "proto3";

package patchbase.agent;

import "google/protobuf/timestamp.proto";
import "patchbase/agent/host.proto";
import "patchbase/agent/package.proto";
import "patchbase/agent/repo.proto";
import "patchbase/agent/runtime.proto";

option go_package = "go.patchbase.net/proto/agent";

message AgentSnapshot {
  string schema_version = 1;
  google.protobuf.Timestamp sent_at = 2;
  Host host = 3;
  repeated Repo repos = 4;
  repeated Package packages = 5;
  Runtime runtime = 6;
}
