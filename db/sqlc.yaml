version: "2"
sql:
  - engine: "postgresql"
    schema: "schema.sql"
    queries: "queries"
    gen:
      go:
        package: "sql"
        out: "gen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: "public.citext"
            go_type: "string"
          - db_type: "public.citext"
            nullable: true
            go_type:
              import: "go.patchbase.net/server/internal/utils"
              type: "Option[string]"
          - db_type: "text"
            nullable: true
            go_type:
              import: "go.patchbase.net/server/internal/utils"
              type: "Option[string]"
