name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually upload)"
        type: boolean
        default: true

env:
  TAG: "${{ github.ref_name }}"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 #0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            gnupg \
            awscli \
            createrepo-c \
            rpm \
            reprepro

      - name: Write version file
        if: github.event_name == 'release'
        run: |
          VERSION=$(echo "$TAG" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "VERSION = \"$VERSION\"" > version.bzl

      - name: Build
        run: bazel build //...

      - name: Package dist
        run: bazel run //:dist

      - name: Prepare release signing artifacts
        env:
          PATCHBASE_PACKAGE_SIGNING_KEY: "${{ secrets.PATCHBASE_PACKAGE_SIGNING_KEY }}"
          PATCHBASE_PACKAGE_SIGNING_KEY_FINGERPRINT: "${{ vars.PATCHBASE_PACKAGE_SIGNING_KEY_FINGERPRINT }}"
          PATCHBASE_PACKAGE_SIGNING_PUBLIC_KEY: "${{ vars.PATCHBASE_PACKAGE_SIGNING_PUBLIC_KEY }}"
          PATCHBASE_PACKAGE_SIGNING_KEY_PASSPHRASE: "${{ secrets.PATCHBASE_PACKAGE_SIGNING_KEY_PASSPHRASE }}"
        run: |
          export RELEASE_GNUPGHOME="$RUNNER_TEMP/patchbase-release-gnupg"
          rm -rf "$RELEASE_GNUPGHOME"
          mkdir -p "$RELEASE_GNUPGHOME"
          chmod 700 "$RELEASE_GNUPGHOME"
          export GNUPGHOME="$RELEASE_GNUPGHOME"

          key_file="$RUNNER_TEMP/patchbase-package-signing-subkey-private.asc"
          trap 'rm -f "$key_file"' EXIT

          printf '%s' "$PATCHBASE_PACKAGE_SIGNING_KEY" > "$key_file"
          gpg --batch --import "$key_file"
          gpg --batch --list-keys --with-fingerprint
          gpg --batch --list-secret-keys --with-fingerprint

          imported_fpr="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          expected_fpr="$(printf '%s' "$PATCHBASE_PACKAGE_SIGNING_KEY_FINGERPRINT" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fpr="$(printf '%s' "$imported_fpr" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"

          test -n "$expected_fpr"
          test -n "$imported_fpr"
          test "$expected_fpr" = "$imported_fpr"

          mkdir -p dist/repo/keys
          printf '%s' "$PATCHBASE_PACKAGE_SIGNING_PUBLIC_KEY" > dist/repo/keys/patchbase.asc
          gpg --batch --yes --dearmor \
            --output dist/repo/keys/patchbase-archive-keyring.gpg \
            dist/repo/keys/patchbase.asc

          test -s dist/repo/keys/patchbase.asc
          test -s dist/repo/keys/patchbase-archive-keyring.gpg

      - name: Generate and sign package repositories
        env:
          PATCHBASE_PACKAGE_SIGNING_KEY_FINGERPRINT: "${{ vars.PATCHBASE_PACKAGE_SIGNING_KEY_FINGERPRINT }}"
          PATCHBASE_PACKAGE_SIGNING_KEY_PASSPHRASE: "${{ secrets.PATCHBASE_PACKAGE_SIGNING_KEY_PASSPHRASE }}"
        run: |
          export RELEASE_GNUPGHOME="$RUNNER_TEMP/patchbase-release-gnupg"
          export GNUPGHOME="$RELEASE_GNUPGHOME"
          ./scripts/build_repo.sh

      - name: Cleanup release signing environment
        if: ${{ always() }}
        run: |
          export RELEASE_GNUPGHOME="$RUNNER_TEMP/patchbase-release-gnupg"
          rm -rf "$RELEASE_GNUPGHOME"

      - name: Safety checks before upload
        run: |
          echo "Running safety checks..."

          # Fail if private key patterns or temporary GPG files are found under dist/repo/
          if grep -qR "BEGIN PGP PRIVATE KEY BLOCK" dist/repo; then
            echo "Error: Private key found in dist/repo"
            exit 1
          fi

          # Fail if RPM repomd.xml signatures are missing
          for repomd in $(find dist/repo/rpm -name "repomd.xml"); do
            if [ ! -f "${repomd}.asc" ]; then
              echo "Error: RPM signature missing for $repomd"
              exit 1
            fi
          done

          # Fail if DEB InRelease or Release.gpg is missing
          if [ ! -f dist/repo/deb/dists/stable/InRelease ] && [ ! -f dist/repo/deb/dists/stable/Release.gpg ]; then
            echo "Error: DEB InRelease and Release.gpg missing"
            exit 1
          fi

          # Fail if unsigned RPMs are present
          for pkg in $(find dist/repo/rpm -name "*.rpm"); do
            if rpm -qpi "$pkg" | grep -Ei "Signature\s*:\s*(none|None)"; then
              echo "Error: Unsigned RPM found: $pkg"
              exit 1
            fi
          done

          echo "All safety checks passed."

      - name: Upload to Cloudflare R2
        env:
          R2_ENDPOINT: "${{ secrets.R2_ENDPOINT }}"
          R2_BUCKET: "${{ secrets.R2_BUCKET }}"
          AWS_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          DRY_RUN: "${{ inputs.dry_run }}"
        run: |
          # Use aws s3 sync for idempotency and efficiency
          if [ "$DRY_RUN" == "true" ]; then
            echo "Running in dry-run mode..."
            aws s3 sync --dryrun --endpoint-url "$R2_ENDPOINT" dist/repo/ "s3://$R2_BUCKET/"
          else
            aws s3 sync --endpoint-url "$R2_ENDPOINT" dist/repo/ "s3://$R2_BUCKET/"
          fi

  release_docker:
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 #0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Write version file
        if: github.event_name == 'release'
        run: |
          VERSION=$(echo "$TAG" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "VERSION = \"$VERSION\"" > version.bzl

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        env:
          DRY_RUN: "${{ inputs.dry_run }}"
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            echo "Running in dry-run mode, skipping push..."
          else
            bazel run //docker:push --//:image_repository=${{ github.repository }}
          fi
