name: Tests

on: push
jobs:
  test:
    name: Bazel
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Start Test Database
        uses: https://github.com/hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3
        with:
          compose-file: "./compose.test.yaml"
      - name: Build Targets
        run: bazel build //...
      - name: Run Tests
        run: bazel test --test_output=errors //...

      - name: Cleanup Environment
        if: ${{ always() }}
        run: docker compose -f ./compose.test.yaml down --volumes --remove-orphans
